*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body,#app{height:100%;overflow:hidden;font-family:Georgia,serif;background:#0d1f0d;color:#fff}

button{font-family:Georgia,serif;touch-action:manipulation}

/* Die spin animation — applied via class, not inline style */
@keyframes diespin{0%{transform:rotate(0deg) scale(1.05)}100%{transform:rotate(360deg) scale(1.05)}}
.die-rolling{animation:diespin 0.1s linear infinite}

/* Pawn CSS transition — always on so it slides smoothly */
.pawn{
  position:absolute;
  width:36px;height:36px;
  display:flex;align-items:center;justify-content:center;
  font-size:24px;
  filter:drop-shadow(0 2px 6px rgba(0,0,0,0.9));
  /* Use transform instead of left/top — GPU composited, no ghosting/trails */
  transition:transform 0.2s ease;
  will-change:transform;
  transform:translate(0px,0px);
  pointer-events:none;
  z-index:10;
  left:0;top:0; /* anchor at 0,0 — position via transform only */
}
.pawn-label{
  position:absolute;top:32px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,0.8);font-size:8px;font-weight:bold;
  border-radius:4px;padding:1px 5px;white-space:nowrap;
}
@keyframes toastIn{
  0%{opacity:0;transform:translateX(-50%) translateY(16px)}
  15%{opacity:1;transform:translateX(-50%) translateY(0)}
  80%{opacity:1}100%{opacity:0}
}
.toast{
  position:fixed;bottom:190px;left:50%;
  background:rgba(0,0,0,0.88);
  border-radius:12px;padding:10px 18px;
  font-size:13px;font-weight:bold;z-index:100;
  max-width:85vw;text-align:center;
  animation:toastIn 2.6s ease forwards;
  pointer-events:none;
}
@keyframes fadeup{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

const CMAP={brown:"#8B4513",lblue:"#42A5F5",pink:"#F06292",orange:"#FF7043",red:"#E53935",yellow:"#FDD835",green:"#43A047",dblue:"#1565C0",gray:"#9E9E9E",white:"#E0E0E0"};
const CGROUPS={brown:[1,3],lblue:[6,8,9],pink:[11,13,14],orange:[16,18,19],red:[21,23,24],yellow:[26,27,29],green:[31,32,34],dblue:[37,39]};
const GROUP_ORDER=["brown","lblue","pink","orange","red","yellow","green","dblue","railroad","utility"];
function sortedByGroup(propIds){
  return [...propIds].sort((a,b)=>{
    const sa=SPACES[a],sb=SPACES[b];
    const oa=GROUP_ORDER.indexOf(sa.color||sa.type);
    const ob=GROUP_ORDER.indexOf(sb.color||sb.type);
    if(oa!==ob) return oa-ob;
    return sa.id-sb.id;
  });
}
function groupedProps(propIds){
  // Returns [{color,type,label,ids:[]}]
  const sorted=sortedByGroup(propIds);
  const groups=[];let cur=null;
  sorted.forEach(id=>{
    const sp=SPACES[id];const key=sp.color||sp.type;
    if(!cur||cur.key!==key){
      const label=sp.type==="railroad"?"Stations":sp.type==="utility"?"Nutsbedrijven":sp.color?sp.color.toUpperCase():"Overig";
      const cb=sp.color?CMAP[sp.color]:null;
      cur={key,label,color:cb,ids:[]};groups.push(cur);
    }
    cur.ids.push(id);
  });
  return groups;
}
const CHANCE=[
  {t:"Ga naar START. Ontvang €200!",a:()=>({money:200,moveTo:0})},
  {t:"Ga naar de gevangenis!",a:()=>({goToJail:true})},
  {t:"Bankfout in jouw voordeel. +€200.",a:()=>({money:200})},

  {t:"Ga naar dichtstbijzijnd station.",a:()=>({moveToNearest:"railroad"})},
  {t:"Rente ontvangen: +€100.",a:()=>({money:100})},
];
const CHEST=[
  {t:"Bankfout in jouw voordeel. +€200.",a:()=>({money:200})},
  {t:"Dokterskosten: -€50.",a:()=>({money:-50})},
  {t:"Bewezen diensten: +€25.",a:()=>({money:25})},

  {t:"Kerstbonus: +€100.",a:()=>({money:100})},
  {t:"Ga naar START. Ontvang €200!",a:()=>({money:200,moveTo:0})},
  {t:"Ga naar de gevangenis!",a:()=>({goToJail:true})},
];
const TOKENS=["🎩","🚂","🐶","⚓"];
const PCOLORS=["#E53935","#1E88E5","#43A047","#FB8C00"];
const CELL=44,CORNER=60,BOARD=CORNER*2+CELL*9;
const DOTS={1:[[50,50]],2:[[25,25],[75,75]],3:[[25,25],[50,50],[75,75]],4:[[25,25],[75,25],[25,75],[75,75]],5:[[25,25],[75,25],[50,50],[25,75],[75,75]],6:[[25,20],[75,20],[25,50],[75,50],[25,80],[75,80]]};

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function rng(){return Math.ceil(Math.random()*6);}
function gridPos(id){if(id<=9)return[10-id,10];if(id<=19)return[0,10-(id-10)];if(id<=29)return[id-20,0];return[10,id-30];}
function cellPx(c){return c===0?0:CORNER+(c-1)*CELL;}
function cellSz(id){return[0,10,20,30].includes(id)?CORNER:CELL;}
function spaceCenter(id){const[col,row]=gridPos(id);const sz=cellSz(id);return{x:cellPx(col)+sz/2,y:cellPx(row)+sz/2};}
function pawnXY(pid,sid){const c=spaceCenter(sid);const off=[[0,-8],[8,4],[-8,4],[0,10]];const[ox,oy]=off[pid]||[0,0];return{x:c.x+ox-18,y:c.y+oy-18};}
function initPlayers(setup){
  return setup.map((s,i)=>({
    id:i, name:s.name||`Speler ${i+1}`, token:TOKENS[i], color:PCOLORS[i],

}

// ─── STATE ────────────────────────────────────────────────────────────────────
let G={
  screen:"menu",numPlayers:2,playerSetup:null, // playerSetup: [{name,isHuman}]
  players:[],owned:{},houses:{},mortgaged:{},
  cur:0,pawnPos:{},dice:[1,1],
  phase:"roll",log:[],freePot:0,
  chanceCards:shuffle(CHANCE),chestCards:shuffle(CHEST),chanceIdx:0,chestIdx:0,
  savedSlots:[null,null,null],
  autoSaveSlot:null,
  _needsSecondLanding:false, // interne vlag: heeft kaart-verplaatsing nog een landing-check nodig?
  // animation lock — pawn can only move when this is false
  busy:false,
};

// ─── MULTIPLAYER STATE ───────────────────────────────────────────────────────
const MP = {
  active: false,      // is multiplayer session active
  isHost: false,      // am I the host?
  peer: null,         // our PeerJS instance
  connections: [],    // host: list of DataConnections to clients
  hostConn: null,     // client: DataConnection to host
  myPid: 0,           // which player index am I?
  roomCode: null,     // 4-digit room code
  status: "",         // status message for UI
};

// ── MULTIPLAYER HELPERS ───────────────────────────────────────────────────────
function mpSend(data) {
  if (!MP.active) return;
  if (MP.isHost) {
    // Host broadcasts to all clients
    MP.connections.forEach(conn => { try { conn.send(data); } catch(e){} });
  } else {
    // Client sends to host
    try { MP.hostConn.send(data); } catch(e) {}
  }
}

function mpSyncState() {
  // Host sends full game state to all clients
  if (!MP.isHost) return;
  mpSend({
    type: "sync",
    state: {
      players: G.players, owned: G.owned, houses: G.houses,
      mortgaged: G.mortgaged, cur: G.cur, phase: G.phase,
      log: G.log.slice(-20), pawnPos: {...G.pawnPos}, freePot: G.freePot,
      dice: G.dice, busy: G.busy,
    }
  });
}

function mpApplySync(state) {
  // Client applies state received from host
  G.players = state.players;
  G.owned = {}; Object.entries(state.owned||{}).forEach(([k,v])=>{G.owned[parseInt(k)]=v;});
  G.houses = {}; Object.entries(state.houses||{}).forEach(([k,v])=>{G.houses[parseInt(k)]=v;});
  G.mortgaged = {}; Object.entries(state.mortgaged||{}).forEach(([k,v])=>{G.mortgaged[parseInt(k)]=v;});
  G.cur = state.cur; G.phase = state.phase; G.freePot = state.freePot;
  G.log = state.log || []; G.dice = state.dice || [1,1]; G.busy = state.busy;
  // Animate pawns to new positions
  Object.entries(state.pawnPos||{}).forEach(([k,v])=>{
    const pid = parseInt(k);
    if (G.pawnPos[pid] !== v) {
      G.pawnPos[pid] = v;
      placePawn(pid, v);
    }
  });
  scrollToPos(G.pawnPos[G.cur] ?? 0);
  refreshUI();
}

function mpHandleMessage(data, fromConn) {
  if (!data || !data.type) return;
  if (MP.isHost) {
    // Host receives actions from clients
    if (data.type === "action") {
      const { action, payload } = data;
      // Only process if it's that client's turn
      const senderPid = MP.connections.indexOf(fromConn) + 1;
      if (G.cur !== senderPid) return;
      if (action === "roll")     handleRoll();
      else if (action === "buy") handleBuy();
      else if (action === "skip") handleSkip();
      else if (action === "endturn") handleEndTurn();
      else if (action === "bailout") handleBailOut();
      else if (action === "build" && payload?.sid != null) doBuild(payload.sid);
      else if (action === "sell"  && payload?.sid != null) doSell(payload.sid);
      else if (action === "mortgage" && payload?.sid != null) doMortgage(payload.sid);
      else if (action === "unmortgage" && payload?.sid != null) doUnmortgage(payload.sid);
      else if (action === "trade_submit" && payload) {
        tradeDraft = payload.draft;
        submitTrade();
      }
      else if (action === "trade_confirm" && payload) {
        execTrade(payload.offerIds,payload.reqIds,payload.mo,payload.mr,payload.fromId,payload.toId);
        addLog("Ruil geaccepteerd! ✅","#4caf50");
        refreshUI(); mpSyncState();
      }
      else if (action === "trade_reject") {
        addLog("Ruil geweigerd.","#888");
        refreshUI(); mpSyncState();
      }
      else if (action === "bankrupt_self") declareBankrupt(senderPid);
    }
  } else {
    // Client receives from host
    if (data.type === "sync") mpApplySync(data.state);
    else if (data.type === "trade_request") {
      // Host is asking client to confirm a trade
      G.tradeRequest = data;
      renderOverlays({tradeConfirmMP: data});
    }
    else if (data.type === "chat") {
      addLog(`💬 ${data.name}: ${data.msg}`, "#aaa");
      refreshLog();
    }
    else if (data.type === "player_joined") {
      showToast(`${data.name} heeft de lobby betreden!`, "#4caf50");
    }
    else if (data.type === "game_start") {
      mpApplySync(data.state);
      buildGameScreen();
    }
    else if (data.type === "kicked") {
      mpReset();
      showToast("Je bent uit het spel verwijderd.", "#f44");
      showMenu();
    }
  }
}

// Client sends an action to host
function mpAction(action, payload) {
  if (!MP.active) return;
  if (MP.isHost) {
    // Host acts directly — no round-trip needed
  } else {
    mpSend({ type: "action", action, payload });
  }
}

function mpReset() {
  if (MP.peer) { try { MP.peer.destroy(); } catch(e){} }
  MP.active = false; MP.isHost = false; MP.peer = null;
  MP.connections = []; MP.hostConn = null;
  MP.myPid = 0; MP.roomCode = null; MP.status = "";
}

// Generate short room code from PeerJS id
function makeRoomCode() {
  return Math.floor(1000 + Math.random() * 9000).toString();
}

// ── HOST: Create room ─────────────────────────────────────────────────────────
function mpCreateRoom(playerName) {
  const code = makeRoomCode();
  MP.roomCode = code;
  MP.isHost = true;
  MP.myPid = 0;
  MP.status = "Lobby aanmaken...";
  renderMPLobby();

  MP.peer = new Peer("propertix-" + code, {
    host: "0.peerjs.com", port: 443, path: "/", secure: true,
    debug: 0,
  });

  MP.peer.on("open", () => {
    MP.status = "Lobby actief";
    // Update host player name
    if (G.playerSetup) G.playerSetup[0].name = playerName;
    renderMPLobby();
  });

  MP.peer.on("connection", (conn) => {
    conn.on("open", () => {
      MP.connections.push(conn);
      const pid = MP.connections.length; // 1-based for clients
      conn.metadata = { pid };
      showToast(`Speler ${pid+1} heeft verbinding gemaakt!`, "#4caf50");
      // Tell everyone who joined
      const joinedName = G.playerSetup[pid]?.name || `Speler ${pid+1}`;
      MP.connections.forEach(c => c.send({ type:"player_joined", name:joinedName }));
      renderMPLobby();
    });
    conn.on("data", (data) => mpHandleMessage(data, conn));
    conn.on("close", () => {
      MP.connections = MP.connections.filter(c => c !== conn);
      renderMPLobby();
    });
  });

  MP.peer.on("error", (err) => {
    MP.status = "Fout: " + err.type;
    showToast("Verbindingsfout: " + err.type, "#f44");
    renderMPLobby();
  });
}

// ── CLIENT: Join room ─────────────────────────────────────────────────────────
function mpJoinRoom(code, playerName) {
  MP.isHost = false;
  MP.roomCode = code;
  MP.status = "Verbinden...";
  renderMPLobby();

  MP.peer = new Peer(undefined, {
    host: "0.peerjs.com", port: 443, path: "/", secure: true, debug: 0,
  });

  MP.peer.on("open", (id) => {
    const conn = MP.peer.connect("propertix-" + code, {
      metadata: { name: playerName },
      reliable: true,
    });
    MP.hostConn = conn;

    conn.on("open", () => {
      MP.status = "Verbonden met lobby";
      conn.send({ type: "client_hello", name: playerName });
      renderMPLobby();
    });
    conn.on("data", (data) => mpHandleMessage(data, conn));
    conn.on("close", () => {
      MP.status = "Verbinding verbroken";
      showToast("Verbinding met host verbroken.", "#f44");
      mpReset(); showMenu();
    });
  });

  MP.peer.on("error", (err) => {
    MP.status = "Kan niet verbinden. Controleer de code.";
    showToast("Kan niet verbinden: " + err.type, "#f44");
    renderMPLobby();
  });
}

// ── HOST: Start the multiplayer game ─────────────────────────────────────────
function mpStartGame() {
  if (!MP.isHost) return;
  const numPlayers = 1 + MP.connections.length;
  // Build playerSetup: host is human pid=0, each client is human pid=1..n
  G.playerSetup = Array.from({length: numPlayers}, (_,i) => ({
    name: i === 0 ? (G.playerSetup[0]?.name || "Host") : (G.playerSetup[i]?.name || `Speler ${i+1}`),
    isHuman: true,
  }));
  MP.active = true;
  // Tell each client their player index
  MP.connections.forEach((conn, i) => {
    conn.send({ type: "your_pid", pid: i+1 });
  });
  startGame();
  // After startGame builds state, sync to all clients
  setTimeout(() => {
    MP.connections.forEach((conn, i) => {
      conn.send({ type: "game_start", pid: i+1, state: {
        players: G.players, owned: G.owned, houses: G.houses,
        mortgaged: G.mortgaged, cur: G.cur, phase: G.phase,
        log: G.log, pawnPos: {...G.pawnPos}, freePot: G.freePot,
        dice: G.dice, busy: G.busy,
      }});
    });
  }, 500);
}

// Patch existing action handlers to sync after each action
function mpWrapHandlers() {
  const orig = {
    roll: handleRoll, buy: handleBuy, skip: handleSkip,
    endTurn: handleEndTurn, bailOut: handleBailOut,
  };
  // After any state-changing action on host, sync to clients
  // We do this by hooking into refreshUI
  const origRefreshUI = refreshUI;
  window._refreshUI = origRefreshUI;
}

// ─── DOM LAYER REFERENCES ────────────────────────────────────────────────────
// We keep persistent DOM nodes so we never rebuild the board during animation
let DOM={
  app:null,          // #app root
  screen:null,       // current top-level screen element
  // game screen layers (persistent after game starts)
  topBar:null,
  boardScroll:null,

// ─── GAME LOGIC ──────────────────────────────────────────────────────────────
function addLog(msg,color="#bbb"){G.log=[...G.log.slice(-80),{msg,color}];}

function applyCard(pc,pid,result,oc){
  // Retourneert of nieuwe positie nog een landing-check nodig heeft
  // (moveBack/moveToNearest hebben zelf geen geldafhandeling)
  let needsLandingCheck=false;
  if(result.money)pc[pid]={...pc[pid],money:pc[pid].money+result.money};
  if(result.moveTo!=null)pc[pid]={...pc[pid],pos:result.moveTo};
  if(result.moveBack){pc[pid]={...pc[pid],pos:((pc[pid].pos-result.moveBack)+40)%40};needsLandingCheck=true;}
  if(result.goToJail)pc[pid]={...pc[pid],pos:10,inJail:true,jailTurns:0};
  if(result.collectFromAll)pc.forEach((_,i)=>{if(i!==pid&&!pc[i].bankrupt){pc[i]={...pc[i],money:pc[i].money-result.collectFromAll};pc[pid]={...pc[pid],money:pc[pid].money+result.collectFromAll};}});
  if(result.moveToNearest){const rr=[5,15,25,35];pc[pid]={...pc[pid],pos:rr.find(r=>r>pc[pid].pos)||rr[0]};needsLandingCheck=true;}
  return needsLandingCheck;
}

function processLanding(pc,oc,pid,pos,diceTotal){
  const sp=SPACES[pos];const pl=pc[pid];let ph="endturn";
  if(sp.type==="go"){pc[pid]={...pl,money:pl.money+200};showToast("🏁 START! +€200 🎉");}
  else if(sp.type==="free"){
    if(G.freePot>0){pc[pid]={...pl,money:pl.money+G.freePot};showToast(`🅿 Vrij Parkeren! +€${G.freePot} 🎉`,"#4caf50");G.freePot=0;}
    else showToast("🅿 Vrij Parkeren — pot leeg.","#aaa");
  }
  else if(sp.type==="gotojail"){pc[pid]={...pl,pos:10,inJail:true,jailTurns:0};showToast("🚔 Naar de gevangenis!","#ff4444");}
  else if(sp.type==="tax"){const t=sp.rent[0];pc[pid]={...pl,money:pl.money-t};G.freePot+=t;showToast(`💸 Belasting -€${t} → pot`,"#ff8800");}
  else if(sp.type==="chest"){const c=G.chestCards[G.chestIdx%G.chestCards.length];G.chestIdx++;showToast(`🎁 ${c.t}`,"#9b59b6");if(applyCard(pc,pid,c.a(),oc))G._needsSecondLanding=true;}
  else if(sp.type==="chance"){const c=G.chanceCards[G.chanceIdx%G.chanceCards.length];G.chanceIdx++;showToast(`❓ ${c.t}`,"#e67e22");if(applyCard(pc,pid,c.a(),oc))G._needsSecondLanding=true;}
  else if(sp.type==="utility"){
    const oid=oc[sp.id];
    if(oid==null){ph=pl.isHuman?"buy":"endturn";if(!pl.isHuman)cpuBuy(pc,oc,pid,sp);}
    else if(oid!==pid&&!G.mortgaged[sp.id]){const cnt=Object.keys(oc).filter(k=>SPACES[+k]?.type==="utility"&&oc[k]===oid).length;const rent=diceTotal*(cnt===2?10:4);pc[pid]={...pc[pid],money:pc[pid].money-rent};pc[oid]={...pc[oid],money:pc[oid].money+rent};addLog(`${pl.name} betaalt €${rent} huur.`,"#ff4444");}
  }
  else if(sp.type==="railroad"){
    const oid=oc[sp.id];
    if(oid==null){ph=pl.isHuman?"buy":"endturn";if(!pl.isHuman)cpuBuy(pc,oc,pid,sp);}
    else if(oid!==pid&&!G.mortgaged[sp.id]){const cnt=Object.keys(oc).filter(k=>SPACES[+k]?.type==="railroad"&&oc[k]===oid).length;const rent=sp.rent[Math.min(cnt-1,3)]||25;pc[pid]={...pc[pid],money:pc[pid].money-rent};pc[oid]={...pc[oid],money:pc[oid].money+rent};addLog(`${pl.name} betaalt €${rent} huur.`,"#ff4444");}
  }
  else if(sp.type==="property"){
    const oid=oc[sp.id];
    if(oid==null){ph=pl.isHuman?"buy":"endturn";if(!pl.isHuman)cpuBuy(pc,oc,pid,sp);}
    else if(oid!==pid&&!G.mortgaged[sp.id]){const hc=G.houses[sp.id]||0;const grp=CGROUPS[sp.color]||[];const mono=grp.every(id=>oc[id]===oid);const rent=hc>0?sp.rent[Math.min(hc,5)]:(mono?sp.rent[0]*2:sp.rent[0]);pc[pid]={...pc[pid],money:pc[pid].money-rent};pc[oid]={...pc[oid],money:pc[oid].money+rent};addLog(`${pl.name} betaalt €${rent} huur aan ${pc[oid].name}.`,"#ff4444");}
  }
  return ph;
}
function cpuBuy(pc,oc,pid,sp){
  if(pc[pid].money>sp.price*1.1){oc[sp.id]=pid;pc[pid]={...pc[pid],money:pc[pid].money-sp.price,properties:[...pc[pid].properties,sp.id]};addLog(`${pc[pid].name} koopt ${sp.name}.`,PCOLORS[pid]);}
}
function cpuRaiseMoney(pc,oc,pid){
  // CPU tries to raise money: first sell hotels->houses, then mortgage cheapest first
  const p=pc[pid];let raised=false;

  // Pass 1: sell houses (most expensive group first to preserve monopolies)
  const houseProps=p.properties.filter(sid=>G.houses[sid]>0);
  houseProps.sort((a,b)=>SPACES[b].houseCost-SPACES[a].houseCost);
  for(const sid of houseProps){
    if(pc[pid].money>=0) break;
    const sp=SPACES[sid];
    // Check even-selling rule
    const grp=CGROUPS[sp.color]||[];
    const maxH=Math.max(...grp.map(id=>G.houses[id]||0));
    if((G.houses[sid]||0)<maxH) continue;
    const sell=Math.floor(sp.houseCost/2);
    G.houses[sid]=(G.houses[sid]||0)-1;
    pc[pid]={...pc[pid],money:pc[pid].money+sell};
    addLog(`${p.name} verkoopt huis op ${sp.name} (nood) +€${sell}.`,PCOLORS[pid]);
    raised=true;
  }

  // Pass 2: mortgage unbuilt properties (cheapest first)
  const mortProps=p.properties.filter(sid=>{
    if(G.mortgaged[sid]) return false;
    const grp=CGROUPS[SPACES[sid].color]||[];
    if(grp.some(id=>G.houses[id]>0)) return false; // can't mortgage group with houses
    return true;
  });
  mortProps.sort((a,b)=>SPACES[a].price-SPACES[b].price);
  for(const sid of mortProps){
    if(pc[pid].money>=0) break;
    const sp=SPACES[sid];
    G.mortgaged[sid]=true;
    pc[pid]={...pc[pid],money:pc[pid].money+sp.mortgage};
    addLog(`${p.name} hypotheekt ${sp.name} (nood) +€${sp.mortgage}.`,PCOLORS[pid]);
    raised=true;
  }
  return raised;
}

function checkBankrupt(pc,oc){
  pc.forEach((p,i)=>{
    if(!p.bankrupt && p.money<0){
      if(!p.isHuman){
        // CPU: try to raise money first
        cpuRaiseMoney(pc,oc,i);
        if(pc[i].money<0){
          // Still broke: bankrupt
          pc[i]={...pc[i],bankrupt:true};
          addLog(`💀 ${pc[i].name} is failliet!`,"#f44");
          Object.keys(oc).forEach(k=>{if(oc[k]===i)delete oc[k];});
        }
      } else {
        // Human: check if they have assets to raise money
        const canRaise=p.properties.some(sid=>{
          if(G.houses[sid]>0) return true;
          if(!G.mortgaged[sid]) return true;
          return false;
        });
        if(!canRaise){
          pc[i]={...p,bankrupt:true};
          addLog(`💀 ${p.name} is failliet!`,"#f44");
          Object.keys(oc).forEach(k=>{if(oc[k]===i)delete oc[k];});
        }
        // else: rescue modal shown by executeMove callback
      }
    }
  });
}

function isInDebt(pid){
  return G.players[pid] && G.players[pid].money < 0 && !G.players[pid].bankrupt;
}

function canPlayerRaiseMoney(pid){
  const p=G.players[pid];if(!p)return false;
  return p.properties.some(sid=>{
    if(G.houses[sid]>0) return true;
    if(!G.mortgaged[sid]) return true;
    return false;
  });
}

function declareBankrupt(pid){
  G.players=G.players.map((p,i)=>i===pid?{...p,bankrupt:true}:p);
  addLog(`💀 ${G.players[pid].name} is failliet!`,"#f44");
  // Remove all properties
  Object.keys(G.owned).forEach(k=>{if(G.owned[k]===pid)delete G.owned[k];});
  // Remove all houses
  G.players[pid].properties.forEach(sid=>{delete G.houses[sid];delete G.mortgaged[sid];});
  closeOverlay();
  G.phase="endturn";
  refreshUI();
  // Check if game over
  const active=G.players.filter(p=>!p.bankrupt);
  if(active.length===1) refreshOverlayWinner();
  else setTimeout(()=>handleEndTurn(),600);
}
function computeCPUTrade(fromId){
  const from=G.players[fromId];if(!from||from.bankrupt)return null;
  for(const[color,group]of Object.entries(CGROUPS)){
    const myIds=group.filter(id=>G.owned[id]===fromId);
    const theirMap={};group.forEach(id=>{const oid=G.owned[id];if(oid!=null&&oid!==fromId){theirMap[oid]=theirMap[oid]||[];theirMap[oid].push(id);}});
    if(myIds.length===group.length-1&&Object.keys(theirMap).length===1){
      const tid=Number(Object.keys(theirMap)[0]);const needed=theirMap[tid];
      if(needed.length===1&&!G.houses[needed[0]]){
        const cands=from.properties.filter(id=>{if(G.houses[id])return false;const sp=SPACES[id];if(sp.type!=="property"&&sp.type!=="railroad")return false;const grp=CGROUPS[sp.color]||[];return!(grp.length>0&&grp.every(gid=>G.owned[gid]===fromId));});
        if(cands.length>0){const offer=cands.sort((a,b)=>SPACES[a].price-SPACES[b].price)[0];const diff=SPACES[needed[0]].price-SPACES[offer].price;return{tid,offer:[offer],request:needed,mo:diff>0?diff:0,mr:diff<0?-diff:0};}
      }
    }
  }
  return null;
}
function cpuAcceptsTrade(tid,offer,request,mo,mr){
  const target=G.players[tid];if(!target||target.bankrupt)return false;

  // Calculate raw value of what target gives up vs receives
  const receives=offer.reduce((s,id)=>s+SPACES[id].price,0)+mo;
  const givesUp =request.reduce((s,id)=>s+SPACES[id].price,0)+mr;

  // Reject if compensation is less than 85% of value given up (not too generous)
  if(receives < givesUp*0.85) return false;

  // Check if receiving offer helps target complete a color group (monopoly)
  let helpsTarget=false;
  for(const id of offer){
    const grp=CGROUPS[SPACES[id].color]||[];
    if(grp.length>0){
      const willHave=grp.filter(gid=>G.owned[gid]===tid||offer.includes(gid));
      if(willHave.length===grp.length) helpsTarget=true;
    }
  }

  // Check if giving up request hurts target (breaks their near-monopoly)
  let hurtsSelf=false;
  for(const id of request){
    const grp=CGROUPS[SPACES[id].color]||[];
    if(grp.length>0){
      const hasNow=grp.filter(gid=>G.owned[gid]===tid);
      // If target has 2+ of a group and we're taking one, it hurts
      if(hasNow.length>=2) hurtsSelf=true;
    }
  }

  // Check if giving up request helps OPPONENT complete a monopoly — bad for target
  let helpsOpponent=false;
  const fromId=G.cur;
  for(const id of request){
    const grp=CGROUPS[SPACES[id].color]||[];
    if(grp.length>0){
      const opponentWillHave=grp.filter(gid=>G.owned[gid]===fromId||request.includes(gid));
      if(opponentWillHave.length===grp.length) helpsOpponent=true;
    }
  }

  // Never give opponent a monopoly unless massively compensated
  if(helpsOpponent && receives < givesUp*1.5) return false;

  // Accept if: helps self + fair value, OR significantly overpaid
  if(helpsTarget && !hurtsSelf && receives>=givesUp*0.9) return true;
  if(receives>=givesUp*1.1) return true; // overpaid by 10%+, always accept
  if(helpsTarget && receives>=givesUp*0.85) return true;

  return false;
}
function execTrade(offerIds,reqIds,mo,mr,fromId,toId){
  G.players=G.players.map((p,i)=>{
    if(i===fromId)return{...p,properties:[...p.properties.filter(x=>!offerIds.includes(x)),...reqIds],money:p.money-mo+mr};
    if(i===toId)return{...p,properties:[...p.properties.filter(x=>!reqIds.includes(x)),...offerIds],money:p.money-mr+mo};
    return p;
  });
  offerIds.forEach(id=>{G.owned[id]=toId;});reqIds.forEach(id=>{G.owned[id]=fromId;});
}

// ─── ANIMATION ENGINE ─────────────────────────────────────────────────────────
// Dice: only touches the two die DOM elements
function animateDice(d1,d2,onDone){
  // Start spin CSS
  DOM.dieEls.forEach(el=>{if(el)el.classList.add("die-rolling");});
  let count=0;
  const iv=setInterval(()=>{
    count++;
    // Show random faces while spinning
    setDieFace(DOM.dieEls[0],rng());
    setDieFace(DOM.dieEls[1],rng());
    if(count>=12){
      clearInterval(iv);
      // Stop spin, show final result
      DOM.dieEls.forEach(el=>{if(el)el.classList.remove("die-rolling");});
      setDieFace(DOM.dieEls[0],d1);
      setDieFace(DOM.dieEls[1],d2);
      G.dice=[d1,d2];
      // Wait 400ms so player can see the result, THEN call onDone
      setTimeout(onDone,400);
    }
  },70);
}

function setDieFace(el,val){
  if(!el)return;
  el.innerHTML="";
  (DOTS[val]||DOTS[1]).forEach(([cx,cy])=>{
    const d=document.createElement("div");
    d.style.cssText=`position:absolute;left:${cx}%;top:${cy}%;transform:translate(-50%,-50%);width:10px;height:10px;border-radius:50%;background:#222`;
    el.appendChild(d);
  });
}

// Pawn: moves the CSS-transitioned pawn element step by step
function animatePawn(pid,from,steps,onDone){
  // Pion beweegt via CSS transform (GPU, geen ghosting).
  // Camera scrollt INSTANT elke stap mee — smooth scroll vecht met
  // de CSS transition en geeft ghosting. Instant = geen conflict.
  let step=0;
  function next(){
    step++;
    const pos=(from+step)%40;
    G.pawnPos[pid]=pos;
    placePawn(pid,pos);        // GPU transform — pion schuift soepel
    scrollToPos(pos, true);    // instant scroll — camera volgt elke stap
    if(step<steps) setTimeout(next,220);
    else setTimeout(onDone,250);
  }
  next();
}

function placePawn(pid,sid){
  const el=DOM.pawns[pid];if(!el)return;
  const{x,y}=pawnXY(pid,sid);
  // Use transform:translate instead of left/top for GPU-composited movement (no ghosting)
  el.style.transform=`translate(${x}px,${y}px)`;
  G.pawnPos[pid]=sid; // keep state in sync
}

function scrollToPos(sid,instant){
  const sc=DOM.boardScroll;if(!sc)return;
  const{x,y}=spaceCenter(sid);
  // Use sc.clientWidth/Height but fall back to window dimensions if 0
  const vw=sc.clientWidth||window.innerWidth||375;
  const vh=sc.clientHeight||(window.innerHeight-160)||500;
  const tx=Math.max(0,x-vw/2);
  const ty=Math.max(0,y-vh/2);
  sc.scrollLeft=tx;  // Direct property assignment — most reliable on iOS Safari
  sc.scrollTop=ty;   // Avoids scrollTo() quirks with behavior:auto on iOS
}

// ─── TURN FLOW ────────────────────────────────────────────────────────────────
function executeMove(pid,d1,d2,cb){
  const total=d1+d2;
  const pc=G.players.map(p=>({...p}));
  const oc={...G.owned};
  const pl=pc[pid];

  if(pl.inJail){
    if(d1===d2){pc[pid]={...pl,inJail:false,jailTurns:0};addLog(`${pl.name} gooit dubbel, verlaat gevangenis!`,PCOLORS[pid]);}
    else if(pl.jailTurns>=2){pc[pid]={...pl,inJail:false,jailTurns:0,money:pl.money-50};G.freePot+=50;addLog(`${pl.name} betaalt €50 boete.`,"#aaa");}
    else{pc[pid]={...pl,jailTurns:pl.jailTurns+1};addLog(`${pl.name} in gevangenis (${pl.jailTurns+1}/3).`,"#aaa");G.players=pc;G.owned=oc;cb("endturn");return;}
  }

  const from=pc[pid].pos;const to=(from+total)%40;
  if(to<from){pc[pid]={...pc[pid],money:pc[pid].money+200};addLog(`${pl.name} passeert START +€200`,"#FFD700");}
  pc[pid]={...pc[pid],pos:to};
  addLog(`${pl.name} gooit ${d1}+${d2}=${total} → ${SPACES[to].name}`,PCOLORS[pid]);

  // Animate pawn, THEN process landing
  animatePawn(pid,from,total,()=>{
    G.pawnPos[pid]=to;
    placePawn(pid,to);

    // Process landing — card effects may change pc[pid].pos
    G._needsSecondLanding=false;
    let np=processLanding(pc,oc,pid,to,total);
    checkBankrupt(pc,oc);
    // Set G.players and G.owned BEFORE finishMove so isInDebt/canPlayerRaiseMoney
    // read the correct updated state
    G.players=pc;G.owned=oc;

    const finalPos=pc[pid].pos;
    const needsSecondLanding=G._needsSecondLanding;

    function finishMove(){
      // Re-read from G.players (already updated above)
      if(G.players[pid]?.isHuman && isInDebt(pid) && canPlayerRaiseMoney(pid)){
        G.phase="rescue";G.busy=false;refreshUI();renderOverlays({rescue:true});
      } else {
        cb(np);
      }
    }

    if(finalPos!==to){
      // Card moved player (moveBack, moveTo, moveToNearest, goToJail)
      const steps=(finalPos-to+40)%40||40;
      setTimeout(()=>{
        if(steps>0&&steps<40){
          animatePawn(pid,to,steps,()=>{
            G.pawnPos[pid]=finalPos;
            placePawn(pid,finalPos);
            scrollToPos(finalPos);
            // moveBack/moveToNearest: het nieuwe vakje moet alsnog normaal
            // verwerkt worden (kopen/huur betalen), want dat is nog niet gebeurd
            if(needsSecondLanding){
              np=processLanding(pc,oc,pid,finalPos,total);
              checkBankrupt(pc,oc);
              G.players=pc;G.owned=oc;
            }
            finishMove();
          });
        } else {
          // Teleport (goToJail = pos 10, of moveTo=0 naar START)
          G.pawnPos[pid]=finalPos;
          placePawn(pid,finalPos);
          scrollToPos(finalPos);
          finishMove();
        }
      },400);
    } else {
      finishMove();
    }
  });
}

function handleRoll(){
  if(G.phase!=="roll"||G.busy)return;
  G.busy=true;
  const d1=rng(),d2=rng();
  // First animate dice, only AFTER they stop → move pawn
  animateDice(d1,d2,()=>{
    executeMove(G.cur,d1,d2,np=>{
      G.phase=np;G.busy=false;
      refreshUI();
    });
  });
}

function handleBailOut(){
  if(!G.players[G.cur]?.inJail||G.players[G.cur].money<50)return;
  G.players=G.players.map((p,i)=>i===G.cur?{...p,inJail:false,jailTurns:0,money:p.money-50}:p);
  G.freePot+=50;addLog(`Jij betaalt €50 borgtocht → pot.`,PCOLORS[G.cur]);
  showToast("🔓 Vrijgekocht voor €50!","#FFD700");refreshUI();
}
function handleBuy(){
  const sp=SPACES[G.players[G.cur].pos];
  if(G.players[G.cur].money<sp.price){addLog("Niet genoeg geld!","#f44");G.phase="endturn";refreshUI();return;}
  G.owned[sp.id]=G.cur;
  G.players=G.players.map((p,i)=>i===G.cur?{...p,money:p.money-sp.price,properties:[...p.properties,sp.id]}:p);
  addLog(`Je koopt ${sp.name} voor €${sp.price}.`,PCOLORS[G.cur]);G.phase="endturn";refreshUI();
}
function handleSkip(){addLog(`Je koopt ${SPACES[G.players[G.cur].pos].name} niet.`,"#888");G.phase="endturn";refreshUI();}

function canBuildHouse(sid){const sp=SPACES[sid];if(sp.type!=="property"||G.owned[sid]!==G.cur||G.mortgaged[sid])return false;const grp=CGROUPS[sp.color]||[];if(!grp.every(id=>G.owned[id]===G.cur&&!G.mortgaged[id]))return false;const h=G.houses[sid]||0;if(h>=5)return false;const min=Math.min(...grp.map(id=>G.houses[id]||0));return h<=min&&G.players[G.cur].money>=sp.houseCost;}
function canSellHouse(sid){const sp=SPACES[sid];if(sp.type!=="property"||G.owned[sid]!==G.cur)return false;const h=G.houses[sid]||0;if(h===0)return false;const max=Math.max(...(CGROUPS[sp.color]||[]).map(id=>G.houses[id]||0));return h===max;}
function canMortgage(sid){if(G.owned[sid]!==G.cur||G.mortgaged[sid])return false;if(SPACES[sid].type==="property"){const grp=CGROUPS[SPACES[sid].color]||[];if(grp.some(id=>G.houses[id]>0))return false;}return true;}
function canUnmortgage(sid){return G.owned[sid]===G.cur&&G.mortgaged[sid]&&G.players[G.cur].money>=Math.floor(SPACES[sid].mortgage*1.1);}
function doBuild(sid){const sp=SPACES[sid];G.houses[sid]=(G.houses[sid]||0)+1;G.players=G.players.map((p,i)=>i===G.cur?{...p,money:p.money-sp.houseCost}:p);addLog(`Huis op ${sp.name}.`,PCOLORS[G.cur]);refreshUI();}
function doSell(sid){const sp=SPACES[sid];const sell=Math.floor(sp.houseCost/2);G.houses[sid]--;G.players=G.players.map((p,i)=>i===G.cur?{...p,money:p.money+sell}:p);addLog(`Huis verkocht op ${sp.name} +€${sell}.`,PCOLORS[G.cur]);refreshUI();}
function doMortgage(sid){const sp=SPACES[sid];G.mortgaged[sid]=true;G.players=G.players.map((p,i)=>i===G.cur?{...p,money:p.money+sp.mortgage}:p);addLog(`Hypotheek ${sp.name} +€${sp.mortgage}.`,PCOLORS[G.cur]);refreshUI();}
function doUnmortgage(sid){const sp=SPACES[sid];const cost=Math.floor(sp.mortgage*1.1);G.mortgaged[sid]=false;G.players=G.players.map((p,i)=>i===G.cur?{...p,money:p.money-cost}:p);addLog(`Hypotheek afgelost ${sp.name}.`,PCOLORS[G.cur]);refreshUI();}

let tradeDraft=null;
function submitTrade(){
  if(!tradeDraft)return;
  const{tid,offerIds,reqIds,mo,mr}=tradeDraft;
  if(offerIds.length===0&&reqIds.length===0&&mo===0&&mr===0){showToast("Voeg iets toe aan het aanbod!","#f44");return;}
  const target=G.players[tid];tradeDraft=null;
  if(!target.isHuman){
    if(cpuAcceptsTrade(tid,offerIds,reqIds,mo,mr)){execTrade(offerIds,reqIds,mo,mr,G.cur,tid);addLog(`${target.name} accepteert ruil! ✅`,PCOLORS[tid]);showToast(`${target.name} accepteert! ✅`,"#4caf50");}
    else{addLog(`${target.name} weigert ruil.`,PCOLORS[tid]);showToast(`${target.name} weigert.`,"#ff4444");}
    renderOverlays();
  } else {
    renderOverlays({tradeConfirm:{fromId:G.cur,tid,offerIds,reqIds,mo,mr}});
  }
}

function autoSave(){
  try{
    // Bewaar de VOLGENDE speler (na deze beurt) i.p.v. de huidige,
    // zodat een geladen autosave altijd netjes bij "roll" van de juiste speler begint.
    const active=G.players.filter(p=>!p.bankrupt);
    let nextCur=G.cur;
    if(active.length>1){
      nextCur=(G.cur+1)%G.players.length;
      while(G.players[nextCur]?.bankrupt) nextCur=(nextCur+1)%G.players.length;
    }
    const d={
      date:new Date().toLocaleString("nl-NL",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"}),
      players:G.players,owned:G.owned,houses:G.houses,mortgaged:G.mortgaged,
      cur:nextCur,phase:"roll",log:G.log.slice(-20),pawnPos:{...G.pawnPos},freePot:G.freePot,
      chanceIdx:G.chanceIdx,chestIdx:G.chestIdx,
    };
    localStorage.setItem("prx_auto",JSON.stringify(d));
  }catch(e){}
}

function handleEndTurn(){
  // Autosave alleen als de HUIDIGE speler (die net zijn beurt beëindigt) menselijk is.
  // Zo niet gebeurt autosave nooit midden in een CPU-keten, wat een inconsistente
  // snapshot zou geven (G.cur op een CPU zonder dat er iets is dat hem laat spelen).
  if(G.players[G.cur]?.isHuman) autoSave();
  const active=G.players.filter(p=>!p.bankrupt);if(active.length<=1)return;
  let next=(G.cur+1)%G.players.length;while(G.players[next]?.bankrupt)next=(next+1)%G.players.length;
  G.cur=next;G.phase="roll";refreshUI();
  if(!G.players[next].isHuman)setTimeout(()=>runCPU(next),600);
}

function runCPU(pid){
  if(G.busy)return;G.busy=true;
  const d1=rng(),d2=rng();
  animateDice(d1,d2,()=>{
    executeMove(pid,d1,d2,_np=>{
      // build houses
      G.players[pid].properties.forEach(sid=>{
        const sp=SPACES[sid];if(sp.type!=="property"||G.mortgaged[sid])return;
        const grp=CGROUPS[sp.color]||[];if(!grp.every(id=>G.owned[id]===pid&&!G.mortgaged[id]))return;
        const h=G.houses[sid]||0;const min=Math.min(...grp.map(id=>G.houses[id]||0));
        if(h>min||h>=5)return;
        if(G.players[pid].money>sp.houseCost*3){G.houses[sid]=(G.houses[sid]||0)+1;G.players[pid]={...G.players[pid],money:G.players[pid].money-sp.houseCost};addLog(`${G.players[pid].name} bouwt huis op ${sp.name}.`,PCOLORS[pid]);}
      });
      // trade
      const tr=computeCPUTrade(pid);
      if(tr&&cpuAcceptsTrade(tr.tid,tr.offer,tr.request,tr.mo,tr.mr)){execTrade(tr.offer,tr.request,tr.mo,tr.mr,pid,tr.tid);addLog(`${G.players[pid].name} ruilt met ${G.players[tr.tid].name}! ✅`,PCOLORS[pid]);}
      G.busy=false;refreshUI();
      setTimeout(()=>handleEndTurn(),400);
    });
  });
}

// ─── BUILD GAME SCREEN (once) ─────────────────────────────────────────────────
function buildGameScreen(){
  // Clear app
  DOM.app.innerHTML="";
  DOM.cells={};DOM.pawns=[];DOM.dieEls=[null,null];

  // Top bar
  DOM.topBar=document.createElement("div");
  DOM.topBar.style.cssText="background:#071207;border-bottom:1px solid #2a4a2a;padding:5px 8px;display:flex;gap:6px;overflow-x:auto;flex-shrink:0;align-items:center;";

  // Board scroll container
  DOM.boardScroll=document.createElement("div");
  DOM.boardScroll.style.cssText="flex:1;overflow:auto;-webkit-overflow-scrolling:touch;padding:8px;position:relative;";

  // Board div (fixed size, holds all cells and pawns)
  DOM.boardDiv=document.createElement("div");
  DOM.boardDiv.style.cssText=`position:relative;width:${BOARD}px;height:${BOARD}px;margin:0 auto;`;

  // Build all 40 space cells
  SPACES.forEach(sp=>{
    const[col,row]=gridPos(sp.id);const sz=cellSz(sp.id);
    const isCorner=[0,10,20,30].includes(sp.id);
    const isBottom=row===10,isLeft=col===0,isTop=row===0;
    const cell=document.createElement("div");
    cell.style.cssText=`position:absolute;left:${cellPx(col)}px;top:${cellPx(row)}px;width:${sz}px;height:${sz}px;box-sizing:border-box;border:1px solid #3a5a3a;background:#e8f5e9;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;font-size:5.5px;cursor:pointer;z-index:1;font-family:Georgia,serif;`;
    cell.addEventListener("click",()=>openSpaceInfo(sp.id));
    DOM.cells[sp.id]=cell;
    DOM.boardDiv.appendChild(cell);
  });

  // Center panel (dice live here — never removed)
  const center=document.createElement("div");
  center.style.cssText=`position:absolute;left:${CORNER}px;top:${CORNER}px;width:${CELL*9}px;height:${CELL*9}px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(circle,#1a4a1a,#091409);pointer-events:none;gap:4px;`;
  const title=document.createElement("div");
  title.style.cssText="font-size:14px;font-weight:bold;color:#FFD700;letter-spacing:3px;font-family:Georgia,serif;";
  title.textContent="PROPERTIX";
  center.appendChild(title);
  const diceRow=document.createElement("div");
  diceRow.style.cssText="display:flex;gap:10px;margin-top:4px;";
  for(let i=0;i<2;i++){
    const die=document.createElement("div");
    die.style.cssText="width:52px;height:52px;background:#fff;border-radius:10px;border:2px solid #ccc;position:relative;box-shadow:0 3px 8px rgba(0,0,0,0.4);flex-shrink:0;";
    diceRow.appendChild(die);DOM.dieEls[i]=die;
  }
  setDieFace(DOM.dieEls[0],1);setDieFace(DOM.dieEls[1],1);
  center.appendChild(diceRow);
  DOM.diceLabel=document.createElement("div");
  DOM.diceLabel.style.cssText="font-size:10px;color:#aaa;margin-top:4px;text-align:center;font-family:Georgia,serif;";
  center.appendChild(DOM.diceLabel);
  DOM.freePotLabel=document.createElement("div");
  DOM.freePotLabel.style.cssText="font-size:9px;color:#4caf50;margin-top:2px;font-family:Georgia,serif;";
  center.appendChild(DOM.freePotLabel);
  DOM.boardDiv.appendChild(center);

  // Pawn elements (one per player, appended to boardDiv)
  G.players.forEach((p,i)=>{
    const el=document.createElement("div");
    el.className="pawn";
    el.textContent=p.token;
    const lbl=document.createElement("div");
    lbl.className="pawn-label";
    lbl.style.color=PCOLORS[i];
    lbl.style.border=`1px solid ${PCOLORS[i]}`;
    lbl.textContent=p.name;
    el.appendChild(lbl);
    DOM.pawns[i]=el;
    DOM.boardDiv.appendChild(el);
    // Place at starting position without transition so there's no slide-in from 0,0
    el.style.transition="none";
    const startSid=G.pawnPos[i]!=null?G.pawnPos[i]:0;
    const{x,y}=pawnXY(i,startSid);
    el.style.transform=`translate(${x}px,${y}px)`;
  });

  DOM.boardScroll.appendChild(DOM.boardDiv);
  // After DOM is appended, enable transitions and scroll in next paint cycle

  // Bottom bar
  DOM.bottomBar=document.createElement("div");
  DOM.bottomBar.style.cssText="background:#071207;border-top:2px solid #2a4a2a;padding:8px 12px;flex-shrink:0;";

  // overlayContainer is persistent on document.body — just clear it
  DOM.overlayContainer.innerHTML="";

  DOM.app.appendChild(DOM.topBar);
  DOM.app.appendChild(DOM.boardScroll);
  DOM.app.appendChild(DOM.bottomBar);
  // overlayContainer stays on body (not inside app) so it always exists

  // Initial render of dynamic parts
  refreshUI();

  // Scroll to start
  // Double rAF: first frame paints pawns at correct position (no transition),
  // second frame enables transitions so future moves animate smoothly,
  // then scroll to current player
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      // Enable transitions on all pawns now that they're painted in correct spots
      DOM.pawns.forEach(el=>{if(el)el.style.transition="transform 0.2s ease";});
      // Scroll to current player's position
      const sid=G.pawnPos[G.cur]!=null?G.pawnPos[G.cur]:(G.players[G.cur]?.pos||0);
      scrollToPos(sid,true);
    });
  });
}

function renderOverlays(opts={}){
  DOM.overlayContainer.innerHTML="";
  const active=G.players.filter(p=>!p.bankrupt);
  if(active.length===1&&G.players.length>1){refreshOverlayWinner();return;}

  if(opts.spaceInfo!=null)      renderSpaceInfoModal(opts.spaceInfo);

}

    });

function renderRescueModal(){
  const pid=G.cur;const p=G.players[pid];
  const debt=Math.abs(p.money);
  const panel_el=panel("");

  // Header
  const hdr=document.createElement("div");
  hdr.style.cssText="margin-bottom:12px;";
  hdr.innerHTML=`<h3 style="color:#ff4444;margin:0 0 4px">⚠️ Te weinig geld!</h3><div style="font-size:13px;color:#ccc">${p.name} heeft <b style="color:#ff4444">€${debt}</b> te weinig. Verkoop huizen of verhypotheek straten om te betalen.</div>`;
  panel_el.appendChild(hdr);

  // Current balance
  const bal=document.createElement("div");
  bal.style.cssText=`font-size:14px;font-weight:bold;color:${p.money<0?"#ff4444":"#4caf50"};margin-bottom:12px;text-align:center;`;
  bal.textContent=`Saldo: €${p.money}`;
  panel_el.appendChild(bal);

  // Properties list with sell/mortgage options
  const props=p.properties;
  if(props.length===0){
    const d=document.createElement("div");d.style.cssText="color:#555;font-size:13px;text-align:center;padding:12px;";
    d.textContent="Geen bezittingen meer om te verkopen.";panel_el.appendChild(d);
  }
  props.forEach(sid=>{
    const sp=SPACES[sid];const h=G.houses[sid]||0;const cb=sp.color?CMAP[sp.color]:null;const isMort=G.mortgaged[sid];
    const card=document.createElement("div");card.style.cssText="border-radius:8px;border:1px solid #1a3a1a;margin-bottom:8px;overflow:hidden;";
    const header=document.createElement("div");
    header.style.cssText=`background:${cb||"#1a3a1a"};padding:5px 10px;display:flex;justify-content:space-between;align-items:center;`;
    header.innerHTML=`<span style="font-weight:bold;font-size:12px;color:#fff;text-shadow:0 1px 2px #000">${sp.name}</span><span style="font-size:11px;color:rgba(255,255,255,0.8)">${isMort?"🏦":h>=5?"🏨":h>0?`🏠×${h}`:""}`;
    const btns=document.createElement("div");btns.style.cssText="padding:7px 8px;background:#0d1a0d;display:flex;flex-wrap:wrap;gap:5px;";

    // Sell houses one at a time
    if(sp.type==="property"&&h>0){
      const grp=CGROUPS[sp.color]||[];
      const maxH=Math.max(...grp.map(id=>G.houses[id]||0));
      const canSell=h===maxH;
      const sellPrice=Math.floor(sp.houseCost/2);
      btns.appendChild(mkBtn(`💰 Verkoop ${h>=5?"hotel":"huis"} +€${sellPrice}`,`padding:5px 10px;font-size:11px;background:${canSell?"#b71c1c":"#1a0a0a"};color:${canSell?"#fff":"#444"};border:none;border-radius:6px;`,()=>{
        if(!canSell)return;
        G.houses[sid]=h-1;
        G.players=G.players.map((pl,i)=>i===pid?{...pl,money:pl.money+sellPrice}:pl);
        addLog(`${p.name} verkoopt huis op ${sp.name} +€${sellPrice}.`,PCOLORS[pid]);
        // Check if debt is resolved
        if(G.players[pid].money>=0){
          showToast(`✅ Schuld afbetaald! Saldo: €${G.players[pid].money}`,"#4caf50");
          closeOverlay();G.phase="endturn";refreshUI();
        } else {
          refreshUI();renderOverlays({rescue:true});
        }
      },!canSell));
    }

    // Mortgage
    if(!isMort){
      const grp=CGROUPS[sp.color]||[];
      const hasHouses=sp.type==="property"&&grp.some(id=>G.houses[id]>0);
      const canMort=!hasHouses;
      btns.appendChild(mkBtn(`🏦 Hypotheek +€${sp.mortgage}`,`padding:5px 10px;font-size:11px;background:${canMort?"#f57c00":"#1a1000"};color:${canMort?"#fff":"#444"};border:none;border-radius:6px;`,()=>{
        if(!canMort)return;
        G.mortgaged[sid]=true;
        G.players=G.players.map((pl,i)=>i===pid?{...pl,money:pl.money+sp.mortgage}:pl);
        addLog(`${p.name} hypotheekt ${sp.name} +€${sp.mortgage}.`,PCOLORS[pid]);
        if(G.players[pid].money>=0){
          showToast(`✅ Schuld afbetaald! Saldo: €${G.players[pid].money}`,"#4caf50");
          closeOverlay();G.phase="endturn";refreshUI();
        } else {
          refreshUI();renderOverlays({rescue:true});
        }
      },!canMort));
    }

    if(btns.children.length>0){card.appendChild(header);card.appendChild(btns);panel_el.appendChild(card);}
  });

  // Declare bankrupt button
  const bkBtn=mkBtn("💀 Opgeven — ik ben failliet","width:100%;padding:11px 0;background:#1a0a0a;color:#888;border:1px solid #333;border-radius:8px;font-size:13px;margin-top:8px;",()=>declareBankrupt(pid));
  panel_el.appendChild(bkBtn);

  backdrop(panel_el,null); // null = don't close on backdrop tap (player must act)
}

      if(grpGroup.length>0){

  p.appendChild(propSection(`Jij wilt van ${target?.name}:`,"#ff8a65",theirProps,tradeDraft.reqIds,id=>{tradeDraft.reqIds=tradeDraft.reqIds.includes(id)?tradeDraft.reqIds.filter(x=>x!==id):[...tradeDraft.reqIds,id];}));

  backdrop(p);

  newGame.style.cssText="background:rgba(255,255,255,0.04);border:1px solid #3a6a3a;border-radius:12px;padding:14px 12px;margin-bottom:14px;text-align:left;";

  const ngTitle=document.createElement("div");
  ngTitle.style.cssText="font-size:13px;color:#FFD700;font-weight:bold;margin-bottom:10px;text-align:center;";
  ngTitle.textContent="🆕 Nieuw spel";newGame.appendChild(ngTitle);

  // Number of players
  const numRow=document.createElement("div");
  numRow.style.cssText="display:flex;align-items:center;gap:8px;margin-bottom:12px;justify-content:center;";
  numRow.innerHTML=`<span style="font-size:12px;color:#ccc;">Spelers:</span>`;
  [2,3,4].forEach(n=>{
    const b=mkBtn(String(n),`padding:8px 16px;border-radius:8px;border:2px solid ${G.numPlayers===n?"#FFD700":"#4a8a4a"};background:${G.numPlayers===n?"#FFD700":"transparent"};color:${G.numPlayers===n?"#000":"#fff"};font-size:17px;font-weight:bold;`,()=>{
      G.numPlayers=n;
      G.playerSetup=Array.from({length:n},(_,i)=>({
        name:G.playerSetup[i]?.name||(i===0?"Speler 1":`CPU ${i}`),
        isHuman:G.playerSetup[i]?.isHuman??i===0
      }));
      showMenu();
    });
    numRow.appendChild(b);
  });
  newGame.appendChild(numRow);

  // Player rows
  const pLabel=document.createElement("div");pLabel.style.cssText="font-size:11px;color:#888;margin-bottom:6px;";pLabel.textContent="Stel per speler in:";newGame.appendChild(pLabel);

  G.playerSetup.forEach((setup,i)=>{
    const row=document.createElement("div");
    row.style.cssText=`display:flex;align-items:center;gap:6px;margin-bottom:8px;background:rgba(255,255,255,0.04);border-radius:8px;padding:7px 8px;border:1px solid ${PCOLORS[i]}44;`;

    const tokenSpan=document.createElement("span");tokenSpan.style.fontSize="18px";tokenSpan.textContent=TOKENS[i];row.appendChild(tokenSpan);

    // Name input
    const inp=document.createElement("input");
    inp.type="text";inp.value=setup.name;inp.maxLength=10;
    inp.style.cssText="flex:1;padding:5px 7px;font-size:13px;background:#1a3a1a;color:#fff;border:1px solid #3a6a3a;border-radius:6px;font-family:Georgia,serif;";
    inp.oninput=e=>{G.playerSetup[i].name=e.target.value||`Speler ${i+1}`;};
    row.appendChild(inp);

    // Human / CPU toggle
    const tog=document.createElement("button");
    tog.style.cssText=`padding:5px 10px;font-size:11px;border-radius:6px;border:none;cursor:pointer;font-weight:bold;font-family:Georgia,serif;background:${setup.isHuman?"#1a6e1a":"#555"};color:#fff;flex-shrink:0;`;
    tog.textContent=setup.isHuman?"👤 Mens":"🤖 CPU";
    tog.onclick=()=>{G.playerSetup[i].isHuman=!G.playerSetup[i].isHuman;showMenu();};
    row.appendChild(tog);

    newGame.appendChild(row);
  });

  const humanCount=G.playerSetup.filter(s=>s.isHuman).length;
  if(humanCount===0){
    const warn=document.createElement("div");warn.style.cssText="font-size:11px;color:#ff8800;margin-bottom:8px;text-align:center;";warn.textContent="⚠️ Minimaal 1 menselijke speler vereist.";newGame.appendChild(warn);
  }

  newGame.appendChild(mkBtn("▶ Spel starten","width:100%;padding:13px 0;font-size:16px;font-weight:bold;background:#FFD700;color:#000;border:none;border-radius:10px;margin-top:4px;",startGame,humanCount===0));
  box.appendChild(newGame);

  // ── Auto-save section ────────────────────────────────────────────────────────
  if(G.autoSaveSlot){
    const asDiv=document.createElement("div");
    asDiv.style.cssText="background:rgba(255,215,0,0.06);border:1px solid #4a6a2a;border-radius:12px;padding:12px;margin-bottom:14px;display:flex;align-items:center;gap:10px;";
    asDiv.innerHTML=`<div style="flex:1"><div style="font-size:12px;color:#FFD700;font-weight:bold;margin-bottom:2px">⚡ Autosave</div><div style="font-size:10px;color:#aaa">${G.autoSaveSlot.date} — ${G.autoSaveSlot.names}</div></div>`;
    asDiv.appendChild(mkBtn("▶ Hervat","padding:8px 14px;font-size:13px;font-weight:bold;background:#FFD700;color:#000;border:none;border-radius:8px;",loadAutoSave));
    box.appendChild(asDiv);
  }

  // ── Multiplayer section ──────────────────────────────────────────────────────
  const mpSection=document.createElement("div");
  mpSection.style.cssText="background:rgba(255,255,255,0.04);border:1px solid #3a6a3a;border-radius:12px;padding:14px 12px;margin-bottom:14px;text-align:center;";
  mpSection.innerHTML=`<div style="font-size:13px;color:#FFD700;font-weight:bold;margin-bottom:6px">🌐 Online Multiplayer</div><p style="color:#aaa;font-size:11px;margin-bottom:10px">Speel met vrienden op andere apparaten</p>`;
  mpSection.appendChild(mkBtn("🌐 Online spelen","width:100%;padding:12px 0;font-size:15px;font-weight:bold;background:#1a6e1a;color:#fff;border:none;border-radius:10px;",showMPSetup));
  box.appendChild(mpSection);

  // ── Saved games section ───────────────────────────────────────────────────
  const saves=document.createElement("div");
  saves.style.cssText="background:rgba(255,255,255,0.04);border:1px solid #3a6a3a;border-radius:12px;padding:14px 12px;";
  saves.innerHTML=`<div style="font-size:13px;color:#FFD700;font-weight:bold;margin-bottom:10px">💾 Opgeslagen spellen</div>`;
  [0,1,2].forEach(i=>{
    const row=document.createElement("div");row.style.cssText="display:flex;align-items:center;gap:8px;margin-bottom:8px;background:rgba(255,255,255,0.04);border-radius:8px;padding:8px 10px;border:1px solid #2a4a2a;";
    const info=document.createElement("div");info.style.flex="1";info.style.textAlign="left";
    info.innerHTML=`<div style="font-size:11px;color:#FFD700;font-weight:bold">Slot ${i+1}</div>${G.savedSlots[i]?`<div style="font-size:10px;color:#aaa;line-height:1.5">${G.savedSlots[i].date}<br>${G.savedSlots[i].names}</div>`:'<div style="font-size:10px;color:#555;font-style:italic">Leeg</div>'}`;
    row.appendChild(info);
    row.appendChild(mkBtn("📂 Laden",`padding:7px 10px;font-size:12px;background:${G.savedSlots[i]?"#1a6e1a":"#222"};color:${G.savedSlots[i]?"#fff":"#555"};border:none;border-radius:7px;`,()=>loadGame(i),!G.savedSlots[i]));
    row.appendChild(mkBtn("🗑️",`padding:7px 8px;font-size:12px;background:${G.savedSlots[i]?"#7f0000":"#1a0000"};color:${G.savedSlots[i]?"#fff":"#333"};border:none;border-radius:7px;`,()=>confirmDeleteGame(i),!G.savedSlots[i]));
    saves.appendChild(row);
  });
  box.appendChild(saves);
  DOM.app.appendChild(box);
}

function startGame(){
  const p=initPlayers(G.playerSetup);const pp={};p.forEach(pl=>{pp[pl.id]=0;});
  G.players=p;G.pawnPos=pp;G.owned={};G.houses={};G.mortgaged={};
  G.cur=0;G.phase="roll";G.log=[];G.freePot=0;G.busy=false;
  G.chanceCards=shuffle(CHANCE);G.chestCards=shuffle(CHEST);G.chanceIdx=0;G.chestIdx=0;
  tradeDraft=null;
  DOM.app.style.cssText="height:100%;display:flex;flex-direction:column;";
  buildGameScreen();
}

// ─── BOOT ─────────────────────────────────────────────────────────────────────
DOM.app=document.getElementById("app");
// Persistent modal overlay — always in body, works on menu AND game screen
DOM.overlayContainer=document.createElement("div");
DOM.overlayContainer.id="overlay";
document.body.appendChild(DOM.overlayContainer);
showMenu();
</script>
</body>
</html>
